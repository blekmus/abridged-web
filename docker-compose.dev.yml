services:
  abridged:
    image: abridged-web-local
    build:
      context: .
    container_name: abridged
    pull_policy: build
    restart: unless-stopped
    environment:
      APP_ENV: production
      PORT: "8080"
      ARCHIVE_ROOT: /archive
    volumes:
      - /path/Abridged:/archive:ro
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
